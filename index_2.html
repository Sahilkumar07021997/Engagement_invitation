<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring Ceremony – Akriti & Sahil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8537a;
            --rose-light: #f9b8cb;
            --rose-pale: #fde8ef;
            --gold: #c9935a;
            --gold-light: #f0d5a8;
            --gold-pale: #fff8ee;
            --cream: #fff5f7;
            --maroon: #7d1f3c;
            --text-dark: #3a1020;
            --text-mid: #6b2a3a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ─── CANVAS PARTICLES ─── */
        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── ENVELOPE SCREEN ─── */
        #envelope-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 30%, #ffe0eb 0%, #f9c5d5 40%, #f0a0bc 100%);
            cursor: pointer;
            transition: opacity .8s ease, transform .8s ease;
        }

        #envelope-screen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .env-border {
            position: absolute;
            inset: 18px;
            border: 2px solid rgba(201, 147, 90, .45);
            border-radius: 4px;
            pointer-events: none;
        }

        .env-border::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201, 147, 90, .25);
            border-radius: 2px;
        }

        /* ethnic corner ornaments */
        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
        }

        .corner svg {
            width: 100%;
            height: 100%;
        }

        .corner.tl {
            top: 24px;
            left: 24px;
        }

        .corner.tr {
            top: 24px;
            right: 24px;
            transform: scaleX(-1);
        }

        .corner.bl {
            bottom: 24px;
            left: 24px;
            transform: scaleY(-1);
        }

        .corner.br {
            bottom: 24px;
            right: 24px;
            transform: scale(-1, -1);
        }

        .env-icon {
            font-size: clamp(5rem, 15vw, 9rem);
            animation: float 3s ease-in-out infinite, pulse-shadow 3s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px rgba(125, 31, 60, .3));
            margin-bottom: 24px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-18px)
            }
        }

        @keyframes pulse-shadow {

            0%,
            100% {
                filter: drop-shadow(0 8px 24px rgba(125, 31, 60, .3))
            }

            50% {
                filter: drop-shadow(0 16px 40px rgba(125, 31, 60, .55))
            }
        }

        .env-headline {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--maroon);
            text-align: center;
            text-shadow: 0 2px 8px rgba(125, 31, 60, .2);
            margin-bottom: 10px;
        }

        .env-sub {
            font-family: 'Cinzel', serif;
            font-size: clamp(.7rem, 2vw, .95rem);
            letter-spacing: .25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .env-btn {
            padding: 14px 42px;
            background: linear-gradient(135deg, var(--maroon), var(--rose));
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: .9rem;
            letter-spacing: .2em;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(125, 31, 60, .4);
            transition: transform .2s, box-shadow .2s;
            animation: btn-glow 2.5s ease-in-out infinite;
        }

        .env-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(125, 31, 60, .5);
        }

        @keyframes btn-glow {

            0%,
            100% {
                box-shadow: 0 6px 24px rgba(125, 31, 60, .4)
            }

            50% {
                box-shadow: 0 6px 40px rgba(232, 83, 122, .7)
            }
        }

        /* ─── MAIN INVITATION ─── */
        #invitation {
            display: none;
            position: relative;
            z-index: 1;
        }

        /* ─── HERO ─── */
        .hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px 40px;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, #fce4ec 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, #fff0e6 0%, transparent 60%),
                var(--cream);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle 1px at 20% 30%, rgba(232, 83, 122, .25) 1px, transparent 0),
                radial-gradient(circle 1px at 75% 60%, rgba(201, 147, 90, .2) 1px, transparent 0),
                radial-gradient(circle 1px at 45% 85%, rgba(232, 83, 122, .15) 1px, transparent 0);
            background-size: 80px 80px, 120px 120px, 60px 60px;
        }

        .om-symbol {
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 12px;
            animation: spin-in .8s ease both;
            opacity: .85;
        }

        @keyframes spin-in {
            from {
                transform: rotate(-180deg) scale(0);
                opacity: 0
            }

            to {
                transform: rotate(0) scale(1);
                opacity: .85
            }
        }

        .ethnic-divider {
            width: min(360px, 90vw);
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
        }

        .ethnic-divider span {
            font-size: 1.2rem;
        }

        .ethnic-divider .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .invite-label {
            font-family: 'Cinzel', serif;
            font-size: clamp(.65rem, 1.8vw, .8rem);
            letter-spacing: .35em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 14px;
            animation: fade-up .7s .2s both;
        }

        .hero-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.2rem, 10vw, 7rem);
            color: var(--maroon);
            line-height: 1.1;
            text-shadow: 0 4px 16px rgba(125, 31, 60, .18);
            animation: fade-up .8s .35s both;
        }

        .hero-amp {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            color: var(--rose);
            display: block;
            margin: -8px 0;
        }

        .hero-event {
            font-family: 'Cinzel', serif;
            font-size: clamp(.85rem, 2.5vw, 1.2rem);
            letter-spacing: .2em;
            color: var(--gold);
            margin-top: 18px;
            animation: fade-up .8s .5s both;
        }

        .rings-icon {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 18px 0;
            animation: fade-up .8s .65s both, spin-ring 8s linear infinite;
        }

        @keyframes spin-ring {

            0%,
            100% {
                transform: rotate(-5deg)
            }

            50% {
                transform: rotate(5deg)
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── ORNATE SECTION CARD ─── */
        .section-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .card {
            background: linear-gradient(160deg, #fffbfc 0%, #fff5f7 60%, #fff9f0 100%);
            border: 1px solid rgba(201, 147, 90, .3);
            border-radius: 4px;
            padding: clamp(28px, 6vw, 56px) clamp(20px, 6vw, 56px);
            position: relative;
            box-shadow: 0 4px 40px rgba(125, 31, 60, .08), 0 1px 4px rgba(125, 31, 60, .05);
            margin-bottom: 32px;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 1px solid rgba(201, 147, 90, .18);
            border-radius: 2px;
            pointer-events: none;
        }

        .card-corner {
            position: absolute;
            width: 48px;
            height: 48px;
            opacity: .55;
        }

        .card-corner.tl {
            top: 10px;
            left: 10px;
        }

        .card-corner.tr {
            top: 10px;
            right: 10px;
            transform: scaleX(-1);
        }

        .card-corner.bl {
            bottom: 10px;
            left: 10px;
            transform: scaleY(-1);
        }

        .card-corner.br {
            bottom: 10px;
            right: 10px;
            transform: scale(-1, -1);
        }

        .section-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--maroon);
            text-align: center;
            margin-bottom: 6px;
        }

        .section-sub {
            font-family: 'Cinzel', serif;
            font-size: .72rem;
            letter-spacing: .3em;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        p.body-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 2.5vw, 1.18rem);
            font-weight: 500;
            line-height: 1.9;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 0.01em;
        }

        p.body-text strong {
            color: var(--maroon);
            font-weight: 700;
        }

        p.body-text em {
            color: var(--rose);
            font-style: italic;
            font-weight: 600;
        }

        /* ─── EVENT DETAILS ─── */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 28px 0;
        }

        .detail-item {
            text-align: center;
            padding: 20px 14px;
            background: linear-gradient(145deg, rgba(253, 232, 239, .6), rgba(255, 248, 238, .6));
            border: 1px solid rgba(201, 147, 90, .25);
            border-radius: 4px;
            position: relative;
        }

        .detail-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .detail-label {
            font-family: 'Cinzel', serif;
            font-size: .68rem;
            letter-spacing: .2em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .detail-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(.95rem, 2.5vw, 1.15rem);
            color: var(--maroon);
            font-weight: 600;
            line-height: 1.35;
        }

        /* ─── COUNTDOWN ─── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 28px);
            margin: 28px 0 20px;
            flex-wrap: wrap;
        }

        .cd-unit {
            text-align: center;
            min-width: 72px;
        }

        .cd-num {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: 700;
            color: var(--maroon);
            line-height: 1;
            display: block;
            text-shadow: 0 2px 8px rgba(125, 31, 60, .15);
        }

        .cd-label {
            font-family: 'Cinzel', serif;
            font-size: .62rem;
            letter-spacing: .2em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .cd-sep {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--rose-light);
            align-self: center;
            margin-top: -8px;
        }

        /* ─── CALENDAR BUTTON ─── */
        .cal-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--gold), #b07840);
            color: #fff;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: .8rem;
            letter-spacing: .2em;
            text-decoration: none;
            box-shadow: 0 4px 18px rgba(180, 120, 60, .4);
            transition: transform .2s, box-shadow .2s;
            margin: 0 auto;
            display: flex;
            width: fit-content;
        }

        .cal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(180, 120, 60, .55);
        }

        /* ─── BLESSING / MESSAGE ─── */
        blockquote.blessing {
            border-left: 3px solid var(--rose-light);
            padding: 16px 24px;
            margin: 24px 0;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 500;
            font-size: clamp(1.05rem, 2.8vw, 1.3rem);
            color: var(--maroon);
            line-height: 1.75;
            background: rgba(253, 232, 239, .35);
            border-radius: 0 8px 8px 0;
            text-align: center;
        }

        /* ─── SIGNATURE ─── */
        .signature {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(201, 147, 90, .25);
        }

        .sig-thanks {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 6vw, 3rem);
            color: var(--rose);
            display: block;
            margin-bottom: 8px;
        }

        .sig-names {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            color: var(--maroon);
        }

        .sig-footer {
            font-family: 'Cinzel', serif;
            font-size: .68rem;
            letter-spacing: .25em;
            color: var(--gold);
            margin-top: 10px;
        }

        /* ─── AUDIO CONTROL ─── */
        .audio-pill {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            background: linear-gradient(135deg, var(--maroon), var(--rose));
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 22px;
            font-family: 'Cinzel', serif;
            font-size: .75rem;
            letter-spacing: .15em;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(125, 31, 60, .4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform .2s;
        }

        .audio-pill:hover {
            transform: scale(1.05);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .details-grid {
                grid-template-columns: 1fr 1fr;
            }

            .cd-sep {
                display: none;
            }
        }
    </style>
</head>
